name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run repository checks
        run: >
          dotnet run --project tests/RepositoryChecks/RepositoryChecks.csproj --configuration Release --
          --repo-root .
          --community-index-url https://gitee.com/aikyan931023/ffxiv-sfx-community/raw/master/index.json
