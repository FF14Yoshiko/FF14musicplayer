<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320" role="img" aria-label="导入音效流程图">
  <rect width="980" height="320" rx="24" fill="#0b1220"/>
  <rect x="38" y="40" width="260" height="240" rx="18" fill="#172033" stroke="#60a5fa" stroke-width="3"/>
  <rect x="360" y="40" width="260" height="240" rx="18" fill="#172033" stroke="#34d399" stroke-width="3"/>
  <rect x="682" y="40" width="260" height="240" rx="18" fill="#172033" stroke="#f59e0b" stroke-width="3"/>
  <text x="168" y="92" text-anchor="middle" fill="#e5e7eb" font-size="28" font-family="Microsoft YaHei, sans-serif">拖进来</text>
  <text x="168" y="145" text-anchor="middle" fill="#ffffff" font-size="24" font-family="Microsoft YaHei, sans-serif">选择音频文件</text>
  <text x="168" y="190" text-anchor="middle" fill="#93c5fd" font-size="20" font-family="Microsoft YaHei, sans-serif">mp3 / wav / ogg</text>
  <text x="490" y="92" text-anchor="middle" fill="#e5e7eb" font-size="28" font-family="Microsoft YaHei, sans-serif">自动复制</text>
  <text x="490" y="145" text-anchor="middle" fill="#ffffff" font-size="24" font-family="Microsoft YaHei, sans-serif">放进音效库目录</text>
  <text x="490" y="190" text-anchor="middle" fill="#86efac" font-size="20" font-family="Microsoft YaHei, sans-serif">以后不用自己找路径</text>
  <text x="812" y="92" text-anchor="middle" fill="#e5e7eb" font-size="28" font-family="Microsoft YaHei, sans-serif">在规则里选</text>
  <text x="812" y="145" text-anchor="middle" fill="#ffffff" font-size="24" font-family="Microsoft YaHei, sans-serif">从下拉框点音效</text>
  <text x="812" y="190" text-anchor="middle" fill="#fde68a" font-size="20" font-family="Microsoft YaHei, sans-serif">SoundId 会自动对应</text>
  <path d="M302 160h38" stroke="#e5e7eb" stroke-width="6" stroke-linecap="round"/>
  <path d="M328 146l18 14-18 14" fill="none" stroke="#e5e7eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M624 160h38" stroke="#e5e7eb" stroke-width="6" stroke-linecap="round"/>
  <path d="M650 146l18 14-18 14" fill="none" stroke="#e5e7eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
